<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="AutoManto"/>
<meta name="theme-color" content="#000000"/>
<title>AutoManto</title>
<link rel="icon" type="image/png" href="icon.png"/>
<link rel="apple-touch-icon" href="icon.png"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:#000}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

/* ── Storage ── */
const SK="automanto_v3", IDB_NAME="automanto_db";
function idbOpen(){return new Promise((res,rej)=>{try{const r=indexedDB.open(IDB_NAME,1);r.onupgradeneeded=e=>e.target.result.createObjectStore("kv");r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej();}catch(e){rej(e);}});}
async function idbGet(){try{const db=await idbOpen();return await new Promise((res,rej)=>{const tx=db.transaction("kv","readonly");const r=tx.objectStore("kv").get(SK);r.onsuccess=()=>res(r.result??null);r.onerror=()=>rej();});}catch{return null;}}
async function idbSet(val){try{const db=await idbOpen();await new Promise((res,rej)=>{const tx=db.transaction("kv","readwrite");tx.objectStore("kv").put(val,SK);tx.oncomplete=()=>res();tx.onerror=()=>rej();});return true;}catch{return false;}}
const lsGet=()=>{try{return localStorage.getItem(SK);}catch{return null;}};
const lsSet=v=>{try{localStorage.setItem(SK,v);}catch{}};
const pJSON=s=>{try{if(s)return JSON.parse(s);}catch{}return null;};
async function storageLoad(){const fast=pJSON(lsGet());if(fast)return fast;return pJSON(await idbGet());}
async function storageSave(data){const j=JSON.stringify(data);lsSet(j);await idbSet(j);}

/* ── Constants ── */
const INIT_V={owner:"",brand:"",model:"",year:"",plate:"",color:"",vin:"",km:"",garage:"",phone:""};
const EMPTY_F={service:"",cat:"",desc:"",date:"",km:"",by:"",place:"",amount:"",notes:""};
const EMPTY_I={name:"",cat:"",km:"",days:"",note:""};

const DEFAULT_INT=[
  {id:1,cat:"Filtros",name:"Aceite de motor",km:5000,days:180,note:"Sintético puede llegar a 7,500 km",custom:false},
  {id:2,cat:"Filtros",name:"Filtro de aceite",km:5000,days:180,note:"Cambiar junto con aceite",custom:false},
  {id:3,cat:"Filtros",name:"Filtro de aire",km:15000,days:365,note:"Revisar condición cada 10,000 km",custom:false},
  {id:4,cat:"Filtros",name:"Filtro de combustible",km:30000,days:730,note:"Gasolina; diesel cada 15,000 km",custom:false},
  {id:5,cat:"Filtros",name:"Filtro de habitáculo",km:15000,days:365,note:"Polvo / carbón activado",custom:false},
  {id:6,cat:"Fluidos",name:"Líquido refrigerante",km:40000,days:730,note:"Revisar nivel cada 10,000 km",custom:false},
  {id:7,cat:"Fluidos",name:"Líquido de frenos",km:30000,days:730,note:"DOT 4 – higroscópico",custom:false},
  {id:8,cat:"Fluidos",name:"Fluido de transmisión",km:40000,days:0,note:"Automática: revisión 30,000 km",custom:false},
  {id:9,cat:"Frenos",name:"Pastillas delanteras",km:25000,days:0,note:"Revisar grosor cada 15,000 km",custom:false},
  {id:10,cat:"Frenos",name:"Pastillas traseras",km:35000,days:0,note:"Suelen durar más que delanteras",custom:false},
  {id:11,cat:"Frenos",name:"Discos de freno",km:60000,days:0,note:"Medir espesor mínimo",custom:false},
  {id:12,cat:"Suspensión",name:"Amortiguadores",km:80000,days:0,note:"Revisar fugas u oscilación",custom:false},
  {id:13,cat:"Suspensión",name:"Rótulas / Bieletas",km:60000,days:0,note:"Inspección en cada alineación",custom:false},
  {id:14,cat:"Neumáticos",name:"Rotación de llantas",km:8000,days:180,note:"Cruzada para desgaste uniforme",custom:false},
  {id:15,cat:"Neumáticos",name:"Alineación y balanceo",km:10000,days:365,note:"Después de golpes fuertes",custom:false},
  {id:16,cat:"Neumáticos",name:"Sustitución neumáticos",km:50000,days:1825,note:"Según profundidad de labrado",custom:false},
  {id:17,cat:"Motor",name:"Bujías",km:30000,days:0,note:"Platino: 60k / Iridio: 100k km",custom:false},
  {id:18,cat:"Motor",name:"Banda de distribución",km:60000,days:1825,note:"Crítico – no omitir",custom:false},
  {id:19,cat:"Motor",name:"Banda de accesorios",km:60000,days:1825,note:"Revisar tensión y grietas",custom:false},
  {id:20,cat:"Eléctrico",name:"Batería",km:0,days:1460,note:"Revisar voltaje cada 2 años",custom:false},
  {id:21,cat:"Eléctrico",name:"Alternador",km:0,days:1825,note:"Revisar con batería",custom:false},
  {id:22,cat:"Aire Acondicionado",name:"Limpieza condensador",km:20000,days:365,note:"Antes de temporada de calor",custom:false},
  {id:23,cat:"Aire Acondicionado",name:"Recarga gas refrigerante",km:0,days:730,note:"R134a o R1234yf",custom:false},
  {id:24,cat:"Inspección",name:"Revisión técnica general",km:0,days:365,note:"Según regulación local",custom:false},
];

const SAMPLE_R=[
  {id:1,service:"Aceite de motor",cat:"Filtros",desc:"Cambio aceite 5W-30 sintético + filtro",date:"2024-06-15",km:45000,by:"AutoShop Pérez",place:"Taller Central",amount:35,notes:"Próximo a 50,000 km"},
  {id:2,service:"Pastillas delanteras",cat:"Frenos",desc:"Sustitución pastillas freno delantero",date:"2024-08-20",km:47500,by:"AutoShop Pérez",place:"Taller Central",amount:80,notes:"Revisar discos próximo cambio"},
  {id:3,service:"Rotación de llantas",cat:"Neumáticos",desc:"Rotación cruzada + calibración presión",date:"2024-09-01",km:48000,by:"Llantería Norte",place:"Llantería Norte",amount:15,notes:"Presión: 32 PSI"},
];

const CATS=["Motor","Transmisión","Frenos","Suspensión","Eléctrico","Neumáticos","Filtros","Fluidos","Carrocería","Aire Acondicionado","Inspección","Otros"];
const CC={Motor:"#FF6B35",Transmisión:"#FF453A",Frenos:"#FF453A",Suspensión:"#BF5AF2",Eléctrico:"#FFD60A",Neumáticos:"#30D158",Filtros:"#0A84FF",Fluidos:"#64D2FF",Carrocería:"#98989E","Aire Acondicionado":"#30D158",Inspección:"#636366",Otros:"#98989E"};

const todayD=new Date();
const fmt=d=>{if(!d)return"—";const p=d.split("-");return`${p[2]}/${p[1]}/${p[0]}`;};
const dDiff=(a,b)=>Math.round((new Date(a)-new Date(b))/(864e5));
const wS=a=>a.map(i=>({...i}));
const sS=a=>a.map(i=>({...i}));

function IRow({iv,T,onCommit,onEdit,onDelete}){
  const kmRef=useRef(null),dayRef=useRef(null);
  const fs={background:T.inp,color:T.tx,border:`1px solid ${T.inpB}`,borderRadius:10,padding:"8px 10px",fontSize:15,width:"100%",boxSizing:"border-box",outline:"none",textAlign:"center"};
  const hKb=()=>{const n=parseInt(kmRef.current.value)||0;kmRef.current.value=String(n);onCommit(iv.id,"km",n);};
  const hDb=()=>{const n=parseInt(dayRef.current.value)||0;dayRef.current.value=String(n);onCommit(iv.id,"days",n);};
  return(
    <div style={{padding:"10px 14px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:500,fontSize:14,color:T.tx,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
            {iv.name}
            {iv.custom&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:8,background:`${T.pu}33`,color:T.pu,fontWeight:600}}>personalizado</span>}
          </div>
          {iv.note&&<div style={{fontSize:11,color:T.tx4,marginTop:1}}>{iv.note}</div>}
        </div>
        <div style={{display:"flex",gap:5,flexShrink:0,marginLeft:8,alignItems:"center"}}>
          <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:`${CC[iv.cat]||"#636366"}33`,color:CC[iv.cat]||"#636366",fontWeight:500}}>{iv.cat}</span>
          <button onClick={()=>onEdit(iv)} style={{fontSize:11,color:T.ac,background:"none",border:`0.5px solid ${T.ac}66`,borderRadius:14,padding:"2px 8px",cursor:"pointer"}}>Editar</button>
          {iv.custom&&<button onClick={()=>onDelete(iv.id)} style={{fontSize:11,color:T.rd,background:"none",border:`0.5px solid ${T.rd}66`,borderRadius:14,padding:"2px 8px",cursor:"pointer"}}>✕</button>}
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:T.tx4,marginBottom:3}}>Cada (km)</div>
          <input ref={kmRef} type="text" inputMode="numeric" defaultValue={String(iv.km)} onBlur={hKb} style={fs}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:T.tx4,marginBottom:3}}>Cada (días)</div>
          <input ref={dayRef} type="text" inputMode="numeric" defaultValue={String(iv.days)} onBlur={hDb} style={fs}/>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [dark,setDark]=useState(true);
  const [tab,setTab]=useState("home");
  const [loaded,setLoaded]=useState(false);
  const [syncMsg,setSyncMsg]=useState("Cargando…");
  const [vehicle,setVehicle]=useState({...INIT_V});
  const [records,setRecords]=useState(SAMPLE_R);
  const [itvs,setItvs]=useState(DEFAULT_INT);
  const [vDraft,setVDraft]=useState({...INIT_V});
  const [form,setForm]=useState({...EMPTY_F});
  const [editId,setEditId]=useState(null);
  const [showRec,setShowRec]=useState(false);
  const [ifrm,setIfrm]=useState({...EMPTY_I});
  const [editIId,setEditIId]=useState(null);
  const [showItv,setShowItv]=useState(false);
  const [tFilt,setTFilt]=useState("all");
  const [tCatFilt,setTCatFilt]=useState("Todos");
  const [catFilt,setCatFilt]=useState("Todos");

  const vRef=useRef(vehicle),rRef=useRef(records),iRef=useRef(itvs);
  useEffect(()=>{vRef.current=vehicle;},[vehicle]);
  useEffect(()=>{rRef.current=records;},[records]);
  useEffect(()=>{iRef.current=itvs;},[itvs]);

  useEffect(()=>{
    const mq=window.matchMedia("(prefers-color-scheme: dark)");
    setDark(mq.matches);
    const h=e=>setDark(e.matches);
    mq.addEventListener("change",h);
    return()=>mq.removeEventListener("change",h);
  },[]);

  useEffect(()=>{
    storageLoad().then(d=>{
      if(d){
        if(d.vehicle){setVehicle(d.vehicle);setVDraft(d.vehicle);}
        if(d.records)setRecords(d.records);
        if(d.itvs)setItvs(d.itvs);
        setSyncMsg("Guardado ✓");
      }else{setSyncMsg("Listo");}
      setLoaded(true);
    });
  },[]);

  const save=(v,r,i)=>{
    setSyncMsg("Guardando…");
    storageSave({vehicle:v??vRef.current,records:r??rRef.current,itvs:i??iRef.current}).then(()=>setSyncMsg("Guardado ✓"));
  };

  const D={
    dark:{
      bg:"#000000",bg2:"#1C1C1E",bg3:"#2C2C2E",bg4:"#3A3A3C",
      tx:"#FFFFFF",tx2:"rgba(235,235,245,0.8)",tx3:"rgba(235,235,245,0.6)",tx4:"rgba(235,235,245,0.36)",
      br:"#38383A",sp:"#38383A",
      ac:"#0A84FF",gr:"#30D158",rd:"#FF453A",or:"#FF9F0A",pu:"#BF5AF2",
      cd:"#1C1C1E",inp:"#2C2C2E",inpB:"#48484A",
      tb:"rgba(28,28,30,0.95)",nb:"rgba(0,0,0,0.9)",sg:"#1C1C1E",sgA:"#3A3A3C",
    },
    light:{
      bg:"#F2F2F7",bg2:"#FFFFFF",bg3:"#F2F2F7",bg4:"#E5E5EA",
      tx:"#000000",tx2:"rgba(60,60,67,0.8)",tx3:"rgba(60,60,67,0.55)",tx4:"rgba(60,60,67,0.3)",
      br:"#C6C6C8",sp:"#E5E5EA",
      ac:"#007AFF",gr:"#34C759",rd:"#FF3B30",or:"#FF9500",pu:"#AF52DE",
      cd:"#FFFFFF",inp:"#FFFFFF",inpB:"#C6C6C8",
      tb:"rgba(249,249,249,0.95)",nb:"rgba(242,242,247,0.95)",sg:"#E5E5EA",sgA:"#FFFFFF",
    }
  };
  const T=dark?D.dark:D.light;

  const km0=parseInt(vehicle.km)||0;

  const tracking=useMemo(()=>itvs.map(iv=>{
    const ms=records.filter(r=>r.service===iv.name).sort((a,b)=>b.km-a.km||new Date(b.date)-new Date(a.date));
    const last=ms[0]||null,lKm=last?last.km:0,lDt=last?last.date:null;
    let kmL=null,dL=null,nKm=null,nDt=null;
    if(iv.km>0&&lKm>0){nKm=lKm+iv.km;kmL=km0>0?nKm-km0:null;}
    if(iv.days>0&&lDt){const nd=new Date(lDt);nd.setDate(nd.getDate()+iv.days);nDt=nd.toISOString().slice(0,10);dL=dDiff(nd,todayD);}
    let st="pending";
    if(last){st="ok";if((kmL!==null&&kmL<=0)||(dL!==null&&dL<=0))st="overdue";else if((kmL!==null&&iv.km>0&&kmL<=iv.km*0.15)||(dL!==null&&dL<=30))st="soon";}
    return{...iv,last,lKm,lDt,kmL,dL,nKm,nDt,st};
  }),[records,itvs,km0]);

  const ov=tracking.filter(t=>t.st==="overdue").length;
  const so=tracking.filter(t=>t.st==="soon").length;
  const ok=tracking.filter(t=>t.st==="ok").length;
  const ts=records.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const fT=tracking.filter(t=>(tFilt==="all"||t.st===tFilt)&&(tCatFilt==="Todos"||t.cat===tCatFilt));
  const fR=[...records].sort((a,b)=>new Date(b.date)-new Date(a.date)).filter(r=>catFilt==="Todos"||r.cat===catFilt);

  const sc=s=>s==="overdue"?T.rd:s==="soon"?T.or:s==="ok"?T.gr:T.tx4;
  const sl=s=>s==="overdue"?"Vencido":s==="soon"?"Próximo":s==="ok"?"Al día":"Sin datos";

  const openAdd=()=>{setForm({...EMPTY_F});setEditId(null);setShowRec(true);};
  const openEdit=r=>{setForm({...r,km:String(r.km),amount:String(r.amount)});setEditId(r.id);setShowRec(true);};
  const saveRec=()=>{
    if(!form.service||!form.date)return;
    const rec={...form,km:parseFloat(form.km)||0,amount:parseFloat(form.amount)||0};
    const next=editId?records.map(r=>r.id===editId?{...rec,id:editId}:r):[...records,{...rec,id:Date.now()}];
    setRecords(next);save(null,next,null);setShowRec(false);setEditId(null);
  };
  const delRec=id=>{const next=records.filter(r=>r.id!==id);setRecords(next);save(null,next,null);};

  const openAddI=()=>{setIfrm({...EMPTY_I});setEditIId(null);setShowItv(true);};
  const openEditI=useCallback(x=>{setIfrm({name:x.name,cat:x.cat,km:String(x.km),days:String(x.days),note:x.note||""});setEditIId(x.id);setShowItv(true);},[records]);
  const saveItv=()=>{
    if(!ifrm.name||!ifrm.cat)return;
    const kv=parseInt(ifrm.km)||0,dv=parseInt(ifrm.days)||0;
    const prev=itvs.find(x=>x.id===editIId);
    const oldName=prev?.name;
    const entry={cat:ifrm.cat,name:ifrm.name,km:kv,days:dv,note:ifrm.note,custom:prev?prev.custom:true};
    const nextItvs=editIId?itvs.map(x=>x.id===editIId?{...entry,id:editIId}:x):[...itvs,{...entry,id:Date.now()}];
    // If name changed, update matching records too
    let nextRecs=records;
    if(editIId&&oldName&&oldName!==ifrm.name){
      nextRecs=records.map(r=>r.service===oldName?{...r,service:ifrm.name}:r);
      setRecords(nextRecs);
    }
    setItvs(nextItvs);save(null,nextRecs,nextItvs);setShowItv(false);setEditIId(null);
  };
  const delItv=useCallback(id=>{setItvs(prev=>{const next=prev.filter(x=>x.id!==id);save(null,null,next);return next;});},[]);
  const commitItv=useCallback((id,field,val)=>{
    setItvs(prev=>{const next=prev.map(x=>x.id===id?{...x,[field]:val}:x);save(null,null,next);return next;});
  },[]);

  const commitVehicle=field=>{const next={...vehicle,[field]:vDraft[field]};setVehicle(next);save(next,null,null);};

  const exportData=()=>{
    const data={vehicle,records,itvs,exportedAt:new Date().toISOString(),version:"1"};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`automanto_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
  };

  const importData=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const d=pJSON(ev.target.result);
      if(!d){alert("Archivo inválido");return;}
      if(window.confirm(`¿Importar datos?\nEsto reemplazará tus registros actuales.\n\nVehículo: ${d.vehicle?.brand||"—"} ${d.vehicle?.model||""}\nRegistros: ${d.records?.length||0}\nExportado: ${d.exportedAt?.slice(0,10)||"—"}`)){
        if(d.vehicle){setVehicle(d.vehicle);setVDraft(d.vehicle);}
        if(d.records)setRecords(d.records);
        if(d.itvs)setItvs(d.itvs);
        save(d.vehicle??vehicle,d.records??records,d.itvs??itvs);
        alert("✅ Datos importados correctamente");
      }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const importRef=useRef(null);

  /* Style helpers */
  const ff="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif";
  const card=(ex={})=>({background:T.cd,borderRadius:14,overflow:"hidden",...ex});
  const rrow=(ex={})=>({display:"flex",alignItems:"center",padding:"12px 16px",borderBottom:`0.5px solid ${T.sp}`,...ex});
  const inp=(ex={})=>({background:T.inp,color:T.tx,border:`1px solid ${T.inpB}`,borderRadius:10,padding:"10px 12px",fontSize:16,width:"100%",boxSizing:"border-box",outline:"none",...ex});
  const lbl={fontSize:13,color:T.tx3,display:"block",marginBottom:5};
  const sh={fontSize:12,fontWeight:600,color:T.tx3,textTransform:"uppercase",letterSpacing:0.6,marginBottom:8,paddingLeft:2};

  const TABS=[
    {id:"home",label:"Inicio",icon:"🏠"},
    {id:"track",label:"Seguimiento",icon:"⏱"},
    {id:"records",label:"Registros",icon:"📋"},
    {id:"config",label:"Config",icon:"⚙️"},
  ];

  if(!loaded)return(
    <div style={{background:T.bg,height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,fontFamily:ff}}>
      <div style={{fontSize:52}}>🚗</div>
      <div style={{fontSize:20,fontWeight:700,color:T.tx}}>AutoManto</div>
      <div style={{fontSize:14,color:T.tx3,marginTop:-8}}>Cargando datos...</div>
      <div style={{width:28,height:28,border:`3px solid ${T.bg3}`,borderTop:`3px solid ${T.ac}`,borderRadius:"50%",animation:"spin 0.8s linear infinite",marginTop:8}}/>
    </div>
  );

  return(
    <div style={{background:T.bg,color:T.tx,height:"100vh",display:"flex",flexDirection:"column",fontFamily:ff,WebkitFontSmoothing:"antialiased"}}>

      {/* HEADER */}
      <div style={{background:T.nb,flexShrink:0,padding:"0 16px 10px",paddingTop:"max(16px, env(safe-area-inset-top))",borderBottom:`0.5px solid ${T.br}`,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontSize:22,fontWeight:700}}>{tab==="home"?"🚗 Panel":tab==="track"?"⏱ Seguimiento":tab==="records"?"📋 Registros":"⚙️ Config"}</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {tab==="records"&&<button onClick={openAdd} style={{background:T.ac,color:"#fff",border:"none",borderRadius:20,padding:"7px 16px",fontSize:14,fontWeight:600,cursor:"pointer"}}>+ Nuevo</button>}
            {tab==="config"&&<button onClick={openAddI} style={{background:T.gr,color:"#fff",border:"none",borderRadius:20,padding:"7px 16px",fontSize:14,fontWeight:600,cursor:"pointer"}}>+ Intervalo</button>}
            <button onClick={()=>setDark(d=>!d)} style={{background:T.bg3,border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center"}}>{dark?"☀️":"🌙"}</button>
          </div>
        </div>
        {vehicle.brand&&<div style={{fontSize:13,color:T.tx3,marginTop:3}}>{vehicle.brand} {vehicle.model} {vehicle.year}{km0>0?` · ${km0.toLocaleString()} km`:""}</div>}
        <div style={{display:"flex",alignItems:"center",gap:5,marginTop:4}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:syncMsg.includes("…")?T.or:T.gr,flexShrink:0}}/>
          <div style={{fontSize:11,color:T.tx4}}>{syncMsg}</div>
        </div>
      </div>

      {/* SCROLL BODY */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        <div style={{padding:"16px",paddingBottom:24}}>

          {/* ── HOME ── */}
          {tab==="home"&&<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <div style={{...card(),padding:"14px 16px",borderTop:`3px solid ${T.ac}`}}>
                <div style={{fontSize:11,color:T.tx3,marginBottom:4,textTransform:"uppercase",letterSpacing:.5}}>Km actuales</div>
                <div style={{fontSize:24,fontWeight:700,color:T.tx}}>{km0>0?km0.toLocaleString():"—"}</div>
                <div style={{fontSize:11,color:T.tx4,marginTop:2}}>odómetro</div>
              </div>
              <div style={{...card(),padding:"14px 16px",borderTop:`3px solid ${T.pu}`}}>
                <div style={{fontSize:11,color:T.tx3,marginBottom:4,textTransform:"uppercase",letterSpacing:.5}}>Total gastado</div>
                <div style={{fontSize:22,fontWeight:700,color:T.tx}}>${ts.toLocaleString("es",{minimumFractionDigits:2})}</div>
                <div style={{fontSize:11,color:T.tx4,marginTop:2}}>{records.length} servicios</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
              {[{l:"Vencidos",v:ov,c:T.rd},{l:"Próximos",v:so,c:T.or},{l:"Al día",v:ok,c:T.gr}].map((s,i)=>(
                <div key={i} style={{background:T.cd,borderRadius:12,padding:"12px",textAlign:"center",border:`1.5px solid ${s.c}44`}}>
                  <div style={{fontSize:28,fontWeight:700,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:12,color:s.c,fontWeight:500,marginTop:2}}>{s.l}</div>
                </div>
              ))}
            </div>
            {(ov>0||so>0)&&<>
              <div style={sh}>Atención requerida</div>
              <div style={{...card(),marginBottom:16}}>
                {tracking.filter(t=>t.st==="overdue"||t.st==="soon").slice(0,6).map((t,i,a)=>(
                  <div key={t.id} style={{...rrow({borderBottom:i<a.length-1?`0.5px solid ${T.sp}`:"none"}),gap:12}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:sc(t.st),flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:500,fontSize:15,color:T.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div>
                      <div style={{fontSize:12,color:T.tx3}}>{t.cat}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      {t.kmL!==null&&<div style={{fontSize:13,fontWeight:600,color:sc(t.st)}}>{t.kmL<=0?`+${Math.abs(t.kmL).toLocaleString()}km`:`${t.kmL.toLocaleString()}km`}</div>}
                      {t.dL!==null&&<div style={{fontSize:11,color:sc(t.st)}}>{t.dL<=0?`${Math.abs(t.dL)}d venc.`:`${t.dL}d`}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </>}
            <div style={sh}>Últimos servicios</div>
            <div style={card()}>
              {records.length===0&&<div style={{padding:"24px 16px",color:T.tx3,textAlign:"center",fontSize:15}}>Sin registros aún</div>}
              {[...records].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5).map((r,i,a)=>(
                <div key={r.id} onClick={()=>openEdit(r)} style={{...rrow({borderBottom:i<a.length-1?`0.5px solid ${T.sp}`:"none",cursor:"pointer"}),gap:12}}>
                  <div style={{width:38,height:38,borderRadius:10,background:`${CC[r.cat]||"#636366"}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {(()=>{const tr=tracking.find(t=>t.name===r.service);const c=tr?sc(tr.st):CC[r.cat]||"#636366";const sz=tr&&tr.st==="overdue"?14:tr&&tr.st==="soon"?11:9;return<div style={{width:sz,height:sz,borderRadius:"50%",background:c,transition:"all .3s",boxShadow:`0 0 ${tr?.st==="overdue"?6:3}px ${c}88`}}/>;})()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:500,fontSize:15,color:T.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.service}</div>
                    <div style={{fontSize:12,color:T.tx3}}>{fmt(r.date)} · {(r.km||0).toLocaleString()} km</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                    <div style={{fontWeight:600,fontSize:15,color:T.tx}}>${(r.amount||0).toFixed(2)}</div>
                    <div style={{color:T.tx4,fontSize:20}}>›</div>
                  </div>
                </div>
              ))}
            </div>
          </>}

          {/* ── SEGUIMIENTO ── */}
          {tab==="track"&&<>
            <div style={{display:"flex",background:T.sg,borderRadius:10,padding:3,marginBottom:10,gap:2}}>
              {[["all","Todos"],["overdue","Vencidos"],["soon","Próximos"],["ok","Al día"]].map(([v,l])=>(
                <button key={v} onClick={()=>setTFilt(v)} style={{flex:1,padding:"7px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:tFilt===v?600:400,background:tFilt===v?T.sgA:"transparent",color:tFilt===v?T.tx:T.tx3}}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{marginBottom:14,overflowX:"auto"}}>
              <div style={{display:"flex",gap:6,paddingBottom:2}}>
                {["Todos",...CATS].map(c=>{
                  const hasItems=c==="Todos"||c==="Otros"||tracking.some(t=>t.cat===c);
                  if(!hasItems)return null;
                  return(
                    <button key={c} onClick={()=>setTCatFilt(c)} style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:tCatFilt===c?600:400,background:tCatFilt===c?(CC[c]||T.ac):T.bg3,color:tCatFilt===c?"#fff":T.tx2,whiteSpace:"nowrap",flexShrink:0,opacity:1}}>
                      {c}
                    </button>
                  );
                })}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {fT.map(t=>{
                const c=sc(t.st);
                return(
                  <div key={t.id} style={{...card(),borderLeft:`3px solid ${c}`}}>
                    <div style={{padding:"12px 14px"}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:6}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:15,color:T.tx,marginBottom:4}}>{t.name}</div>
                          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                            <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:`${CC[t.cat]||"#636366"}33`,color:CC[t.cat]||"#636366",fontWeight:500}}>{t.cat}</span>
                            <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:`${c}22`,color:c,fontWeight:600}}>{sl(t.st)}</span>
                          </div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          {t.kmL!==null&&<div style={{fontSize:16,fontWeight:700,color:c}}>{t.kmL<=0?`+${Math.abs(t.kmL).toLocaleString()}`:t.kmL.toLocaleString()} km</div>}
                          {t.dL!==null&&<div style={{fontSize:12,color:c,fontWeight:500}}>{t.dL<=0?`${Math.abs(t.dL)}d vencido`:`${t.dL} días`}</div>}
                          {t.kmL===null&&t.dL===null&&<div style={{fontSize:12,color:T.tx4}}>sin datos</div>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:16,flexWrap:"wrap",paddingTop:8,borderTop:`0.5px solid ${T.sp}`}}>
                        {[
                          ["Último km",t.lKm>0?t.lKm.toLocaleString()+"km":"—"],
                          ["Último",t.lDt?fmt(t.lDt):"—"],
                          t.nKm?["Próximo km",t.nKm.toLocaleString()+"km"]:null,
                          t.nDt?["Próxima fecha",fmt(t.nDt)]:null,
                        ].filter(Boolean).map(([k,v])=>(
                          <div key={k}>
                            <div style={{fontSize:10,color:T.tx4,textTransform:"uppercase",letterSpacing:.3}}>{k}</div>
                            <div style={{fontSize:13,fontWeight:500,color:T.tx2}}>{v}</div>
                          </div>
                        ))}
                      </div>
                      {t.last&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}>
                        <div style={{fontSize:12,color:T.tx3}}>Por <b style={{color:T.tx2}}>{t.last.by}</b> · ${(t.last.amount||0).toFixed(2)}</div>
                        <button onClick={()=>openEdit(t.last)} style={{fontSize:11,color:T.ac,background:"none",border:`0.5px solid ${T.ac}66`,borderRadius:20,padding:"3px 10px",cursor:"pointer",fontWeight:500}}>Editar</button>
                      </div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </>}

          {/* ── REGISTROS ── */}
          {tab==="records"&&<>
            <div style={{marginBottom:12,overflowX:"auto"}}>
              <div style={{display:"flex",gap:6,paddingBottom:4}}>
                {["Todos",...CATS].map(c=>(
                  <button key={c} onClick={()=>setCatFilt(c)} style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:catFilt===c?600:400,background:catFilt===c?T.ac:T.bg3,color:catFilt===c?"#fff":T.tx2,whiteSpace:"nowrap",flexShrink:0}}>
                    {c}
                  </button>
                ))}
              </div>
            </div>
            {fR.length===0&&<div style={{...card(),padding:"32px 16px",textAlign:"center",color:T.tx3,fontSize:15}}>Sin registros.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {fR.map(r=>(
                <div key={r.id} style={card()}>
                  <div style={{padding:"12px 14px"}}>
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:4}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:15,color:T.tx}}>{r.service}</div>
                        {r.desc&&<div style={{fontSize:13,color:T.tx3,marginTop:1}}>{r.desc}</div>}
                      </div>
                      <div style={{fontWeight:700,fontSize:16,marginLeft:12,color:T.tx}}>${(r.amount||0).toFixed(2)}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:`${CC[r.cat]||"#636366"}33`,color:CC[r.cat]||"#636366",fontWeight:500}}>{r.cat}</span>
                      <span style={{fontSize:12,color:T.tx3}}>{fmt(r.date)}</span>
                      <span style={{fontSize:12,color:T.tx3}}>{(r.km||0).toLocaleString()} km</span>
                      <span style={{fontSize:12,color:T.tx3}}>{r.by}</span>
                    </div>
                  </div>
                  <div style={{display:"flex",borderTop:`0.5px solid ${T.sp}`}}>
                    <button onClick={()=>openEdit(r)} style={{flex:1,padding:"10px",background:"none",border:"none",cursor:"pointer",fontSize:14,color:T.ac,fontWeight:500,borderRight:`0.5px solid ${T.sp}`}}>Editar</button>
                    <button onClick={()=>delRec(r.id)} style={{flex:1,padding:"10px",background:"none",border:"none",cursor:"pointer",fontSize:14,color:T.rd,fontWeight:500}}>Eliminar</button>
                  </div>
                </div>
              ))}
            </div>
            {records.length>0&&<div style={{...card({marginTop:12}),padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:15,color:T.tx2}}>Total invertido</span>
              <span style={{fontSize:18,fontWeight:700,color:T.gr}}>${ts.toLocaleString("es",{minimumFractionDigits:2})}</span>
            </div>}
          </>}

          {/* ── CONFIG ── */}
          {tab==="config"&&<>
            <div style={sh}>Vehículo</div>
            <div style={{...card(),marginBottom:20}}>
              {[["owner","Propietario","text","Juan Pérez"],["brand","Marca","text","Toyota"],["model","Modelo","text","Corolla"],["year","Año","number","2019"],["plate","Matrícula","text","ABC-1234"],["color","Color","text","Blanco"],["vin","VIN","text","1HGCM..."],["km","Km actuales","number","50000"],["garage","Taller","text","AutoShop"],["phone","Teléfono","tel","+1 555 0100"]].map(([field,label,type,ph],i,a)=>(
                <div key={field} style={{...rrow({borderBottom:i<a.length-1?`0.5px solid ${T.sp}`:"none",gap:12})}}>
                  <div style={{width:96,fontSize:14,color:T.tx3,flexShrink:0}}>{label}</div>
                  <input type={type} value={vDraft[field]} onChange={e=>setVDraft(d=>({...d,[field]:e.target.value}))} onBlur={()=>commitVehicle(field)} placeholder={ph} style={{background:"transparent",color:T.tx,border:"none",textAlign:"right",padding:0,fontSize:15,flex:1,outline:"none"}}/>
                </div>
              ))}
            </div>
            {itvs.filter(x=>x.custom).length>0&&<>
              <div style={{...sh,color:T.pu}}>Personalizados</div>
              <div style={{...card(),marginBottom:12}}>
                {itvs.filter(x=>x.custom).map((iv,i,a)=>(
                  <div key={iv.id} style={{borderBottom:i<a.length-1?`0.5px solid ${T.sp}`:"none"}}>
                    <IRow iv={iv} T={T} onCommit={commitItv} onEdit={openEditI} onDelete={delItv}/>
                  </div>
                ))}
              </div>
            </>}
            {/* Exportar / Importar */}
            <div style={sh}>Respaldo de datos</div>
            <div style={{...card(),marginBottom:20}}>
              <div style={{...rrow({borderBottom:`0.5px solid ${T.sp}`}),justifyContent:"space-between"}}>
                <div>
                  <div style={{fontWeight:500,fontSize:15,color:T.tx}}>Exportar datos</div>
                  <div style={{fontSize:12,color:T.tx3,marginTop:1}}>Descarga un archivo .json con todo</div>
                </div>
                <button onClick={exportData} style={{background:T.ac,color:"#fff",border:"none",borderRadius:20,padding:"7px 16px",fontSize:14,fontWeight:600,cursor:"pointer"}}>📤 Exportar</button>
              </div>
              <div style={{...rrow({borderBottom:"none"}),justifyContent:"space-between"}}>
                <div>
                  <div style={{fontWeight:500,fontSize:15,color:T.tx}}>Importar datos</div>
                  <div style={{fontSize:12,color:T.tx3,marginTop:1}}>Carga un backup .json previo</div>
                </div>
                <button onClick={()=>importRef.current.click()} style={{background:T.gr,color:"#fff",border:"none",borderRadius:20,padding:"7px 16px",fontSize:14,fontWeight:600,cursor:"pointer"}}>📥 Importar</button>
              </div>
              <input ref={importRef} type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
            </div>

            <div style={sh}>Predefinidos</div>
            <div style={card()}>
              {itvs.filter(x=>!x.custom).map((iv,i,a)=>(
                <div key={iv.id} style={{borderBottom:i<a.length-1?`0.5px solid ${T.sp}`:"none"}}>
                  <IRow iv={iv} T={T} onCommit={commitItv} onEdit={openEditI} onDelete={delItv}/>
                </div>
              ))}
            </div>
          </>}

        </div>
      </div>

      {/* MODAL: REGISTRO */}
      {showRec&&(
        <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"flex-end"}}>
          <div style={{background:T.bg2,borderRadius:"20px 20px 0 0",width:"100%",maxHeight:"90vh",overflowY:"auto",WebkitOverflowScrolling:"touch",paddingBottom:32}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 12px",position:"sticky",top:0,background:T.bg2,zIndex:1,borderBottom:`0.5px solid ${T.br}`}}>
              <div style={{fontWeight:700,fontSize:18,color:T.tx}}>{editId?"Editar registro":"Nuevo registro"}</div>
              <button onClick={()=>{setShowRec(false);setEditId(null);}} style={{background:T.bg4,border:"none",borderRadius:"50%",width:30,height:30,cursor:"pointer",color:T.tx,fontSize:16}}>✕</button>
            </div>
            <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
              {[
                {f:"service",l:"Servicio / Pieza",t:"text",ph:"Escribe o selecciona...",list:"sl"},
                {f:"cat",l:"Categoría",t:"select"},
                {f:"date",l:"Fecha",t:"date"},
                {f:"km",l:"Km al realizar",t:"number",ph:"ej. 47500"},
                {f:"by",l:"Realizado por",t:"text",ph:"Nombre del mecánico"},
                {f:"place",l:"Taller / Lugar",t:"text",ph:"Nombre del taller"},
                {f:"amount",l:"Monto ($)",t:"number",ph:"0.00"},
                {f:"desc",l:"Descripción",t:"area",ph:"Describe el servicio..."},
                {f:"notes",l:"Notas",t:"area",ph:"Observaciones..."},
              ].map(({f,l,t,ph,list})=>(
                <div key={f}>
                  <label style={lbl}>{l}</label>
                  {t==="select"?(
                    <select value={form.cat} onChange={e=>setForm(x=>({...x,cat:e.target.value}))} style={inp()}>
                      <option value="">Seleccionar...</option>
                      {CATS.map(c=><option key={c}>{c}</option>)}
                    </select>
                  ):t==="area"?(
                    <textarea value={form[f]} onChange={e=>setForm(x=>({...x,[f]:e.target.value}))} rows={2} placeholder={ph} style={{...inp({resize:"vertical",lineHeight:1.5})}}/>
                  ):(
                    <>
                      <input list={list} type={t} value={form[f]} onChange={e=>setForm(x=>({...x,[f]:e.target.value}))} placeholder={ph} style={inp()}/>
                      {list&&<datalist id={list}>{itvs.map(i=><option key={i.id} value={i.name}/>)}</datalist>}
                    </>
                  )}
                </div>
              ))}
              <button onClick={saveRec} disabled={!form.service||!form.date} style={{padding:"14px",background:(!form.service||!form.date)?T.bg4:T.ac,color:(!form.service||!form.date)?T.tx3:"#fff",border:"none",borderRadius:12,cursor:"pointer",fontWeight:700,fontSize:17}}>
                {editId?"Guardar cambios":"Agregar registro"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL: INTERVALO */}
      {showItv&&(
        <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"flex-end"}}>
          <div style={{background:T.bg2,borderRadius:"20px 20px 0 0",width:"100%",maxHeight:"85vh",overflowY:"auto",WebkitOverflowScrolling:"touch",paddingBottom:32}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 12px",position:"sticky",top:0,background:T.bg2,zIndex:1,borderBottom:`0.5px solid ${T.br}`}}>
              <div style={{fontWeight:700,fontSize:18,color:T.tx}}>{editIId?"Editar intervalo":"Nuevo intervalo"}</div>
              <button onClick={()=>{setShowItv(false);setEditIId(null);}} style={{background:T.bg4,border:"none",borderRadius:"50%",width:30,height:30,cursor:"pointer",color:T.tx,fontSize:16}}>✕</button>
            </div>
            <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
              <div><label style={lbl}>Nombre *</label><input value={ifrm.name} onChange={e=>setIfrm(x=>({...x,name:e.target.value}))} placeholder="ej. Limpieza de inyectores" style={inp()}/></div>
              <div>
                <label style={lbl}>Categoría *</label>
                <select value={ifrm.cat} onChange={e=>setIfrm(x=>({...x,cat:e.target.value}))} style={inp()}>
                  <option value="">Seleccionar...</option>
                  {CATS.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><label style={lbl}>Cada (km)</label><input type="number" value={ifrm.km} onChange={e=>setIfrm(x=>({...x,km:e.target.value}))} placeholder="0" style={{...inp({textAlign:"center"})}}/></div>
                <div><label style={lbl}>Cada (días)</label><input type="number" value={ifrm.days} onChange={e=>setIfrm(x=>({...x,days:e.target.value}))} placeholder="0" style={{...inp({textAlign:"center"})}}/></div>
              </div>
              <div><label style={lbl}>Nota</label><input value={ifrm.note} onChange={e=>setIfrm(x=>({...x,note:e.target.value}))} placeholder="Descripción breve..." style={inp()}/></div>
              <button onClick={saveItv} disabled={!ifrm.name||!ifrm.cat} style={{padding:"14px",background:(!ifrm.name||!ifrm.cat)?T.bg4:T.gr,color:(!ifrm.name||!ifrm.cat)?T.tx3:"#fff",border:"none",borderRadius:12,cursor:"pointer",fontWeight:700,fontSize:17}}>
                {editIId?"Guardar cambios":"Crear intervalo"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* TAB BAR */}
      <div style={{background:T.tb,borderTop:`0.5px solid ${T.br}`,flexShrink:0,paddingBottom:"max(12px, env(safe-area-inset-bottom))"}}>
        <div style={{display:"flex",justifyContent:"space-around",padding:"8px 0 0"}}>
          {TABS.map(t=>{
            const a=tab===t.id;
            return(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 16px",background:"none",border:"none",cursor:"pointer",color:a?T.ac:T.tx3,minWidth:60}}>
                <div style={{fontSize:22,opacity:a?1:0.6}}>{t.icon}</div>
                <div style={{fontSize:10,fontWeight:a?600:400}}>{t.label}</div>
                {a&&<div style={{width:4,height:4,borderRadius:"50%",background:T.ac,marginTop:1}}/>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
